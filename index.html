<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リズムゲーム</title>
<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    text-align: center;
    font-family: Arial;
}

h2 {
    margin: 10px;
}

#game {
    position: relative;
    width: 320px;
    height: 520px;
    margin: 10px auto;
    background: #1a1a1a;
    border: 3px solid #444;
    overflow: hidden;
}

.lane {
    position: absolute;
    width: 25%;
    height: 100%;
    border-left: 1px solid #333;
}

.lane.active {
    background: rgba(0,255,255,0.3);
}

.lane:nth-child(1){left:0}
.lane:nth-child(2){left:25%}
.lane:nth-child(3){left:50%}
.lane:nth-child(4){left:75%}

.note {
    position: absolute;
    width: 100%;
    height: 18px;
    background: cyan;
    border-radius: 5px;
}

#hitLine {
    position: absolute;
    bottom: 70px;
    width: 100%;
    height: 4px;
    background: red;
}

#judge {
    height: 30px;
    font-size: 22px;
}

#ui {
    margin-top: 5px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>🎵 リズムゲーム</h2>
<button id="startBtn">スタート</button>

<div id="game">
    <div class="lane" data-lane="0"></div>
    <div class="lane" data-lane="1"></div>
    <div class="lane" data-lane="2"></div>
    <div class="lane" data-lane="3"></div>
    <div id="hitLine"></div>
</div>

<div id="judge"></div>

<div id="ui">
    スコア: <span id="score">0</span><br>
    コンボ: <span id="combo">0</span><br>
    キー: D F J K / タップOK
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const lanes = 4;
const keys = ["d","f","j","k"];
const game = document.getElementById("game");
const music = document.getElementById("music");

let notes = [];
let score = 0;
let combo = 0;
let startTime = 0;

// シンプル譜面（ms）
const chart = [];
for(let i=0;i<50;i++){
    chart.push({
        time: i*600 + 1000,
        lane: Math.floor(Math.random()*4)
    });
}

// ノーツ生成
function spawnNote(data){
    const note = document.createElement("div");
    note.className = "note";
    note.style.left = (data.lane*25)+"%";
    game.appendChild(note);

    notes.push({
        el: note,
        lane: data.lane,
        time: data.time,
        y: 0,
        hit: false
    });
}

// 判定
function getJudge(diff){
    diff = Math.abs(diff);
    if(diff < 80) return "Perfect";
    if(diff < 160) return "Great";
    if(diff < 250) return "Good";
    return "Miss";
}

// 更新
function update(){
    let now = performance.now() - startTime;

    chart.forEach(n=>{
        if(!n.spawned && now > n.time-1500){
            spawnNote(n);
            n.spawned = true;
        }
    });

    notes.forEach((n,i)=>{
        let t = now - n.time;
        n.y = t*0.35 + 300;
        n.el.style.top = n.y + "px";

        if(n.y > 550 && !n.hit){
            n.el.remove();
            notes.splice(i,1);
            combo = 0;
            updateUI("Miss");
        }
    });

    requestAnimationFrame(update);
}

// 入力処理
function hitLane(lane){
    let laneEl = document.querySelectorAll(".lane")[lane];
    laneEl.classList.add("active");
    setTimeout(()=>laneEl.classList.remove("active"),100);

    let now = performance.now() - startTime;

    for(let i=0;i<notes.length;i++){
        let n = notes[i];
        if(n.lane === lane){
            let diff = now - n.time;
            let result = getJudge(diff);

            if(result !== "Miss"){
                n.el.remove();
                notes.splice(i,1);

                combo++;
                score += (result==="Perfect"?300:result==="Great"?150:50) * combo;

                updateUI(result);
                return;
            }
        }
    }

    combo = 0;
    updateUI("Miss");
}

// キーボード
document.addEventListener("keydown",(e)=>{
    let lane = keys.indexOf(e.key);
    if(lane !== -1) hitLane(lane);
});

// タップ対応
document.querySelectorAll(".lane").forEach(l=>{
    l.addEventListener("click",()=>{
        hitLane(parseInt(l.dataset.lane));
    });
});

// UI更新
function updateUI(text){
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
    document.getElementById("judge").innerText = text;
}

// スタート
document.getElementById("startBtn").onclick = ()=>{
    notes = [];
    score = 0;
    combo = 0;
    chart.forEach(n=>n.spawned=false);

    startTime = performance.now();
    music.currentTime = 0;
    music.play();

    update();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>寿司打風ゲーム</title>
<style>
body {
    margin: 0;
    background: linear-gradient(#0f2027,#203a43,#2c5364);
    color: white;
    font-family: Arial;
    text-align: center;
}

h2 {
    margin: 10px;
}

#game {
    position: relative;
    width: 600px;
    height: 200px;
    margin: 20px auto;
    background: #111;
    overflow: hidden;
    border: 3px solid #444;
}

.word {
    position: absolute;
    font-size: 24px;
    white-space: nowrap;
}

#inputBox {
    font-size: 20px;
    padding: 5px;
    width: 300px;
}

#ui {
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>🍣 寿司打風タイピングゲーム</h2>
<button id="startBtn">スタート</button>

<div id="game"></div>

<input id="inputBox" placeholder="ここに入力..." autocomplete="off">

<div id="ui">
    スコア: <span id="score">0</span><br>
    コンボ: <span id="combo">0</span><br>
    残り時間: <span id="time">30</span>
</div>

<script>
const wordsList = [
    "sushi","maguro","salmon","ebi","tamago",
    "ikura","uni","anago","hamachi","tuna",
    "rice","nori","wasabi","soy","tempura"
];

let words = [];
let score = 0;
let combo = 0;
let time = 30;
let playing = false;

// 単語生成
function spawnWord(){
    const text = wordsList[Math.floor(Math.random()*wordsList.length)];
    const div = document.createElement("div");
    div.className = "word";
    div.innerText = text;
    div.style.left = "600px";
    div.style.top = Math.random()*150 + "px";

    document.getElementById("game").appendChild(div);

    words.push({
        el: div,
        text: text,
        x: 600
    });
}

// 更新処理
function update(){
    if(!playing) return;

    words.forEach((w,i)=>{
        w.x -= 2;
        w.el.style.left = w.x + "px";

        // 逃した
        if(w.x < -100){
            w.el.remove();
            words.splice(i,1);
            combo = 0;
        }
    });

    requestAnimationFrame(update);
}

// 入力判定
document.getElementById("inputBox").addEventListener("input",(e)=>{
    const val = e.target.value;

    for(let i=0;i<words.length;i++){
        if(words[i].text === val){
            words[i].el.remove();
            words.splice(i,1);

            score += 100 * (combo+1);
            combo++;

            e.target.value = "";
            updateUI();
            return;
        }
    }
});

// UI更新
function updateUI(){
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
}

// タイマー
function startTimer(){
    const timer = setInterval(()=>{
        if(!playing){
            clearInterval(timer);
            return;
        }

        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            playing = false;
            alert("終了！スコア: " + score);
            clearInterval(timer);
        }
    },1000);
}

// スタート
document.getElementById("startBtn").onclick = ()=>{
    words = [];
    score = 0;
    combo = 0;
    time = 30;
    playing = true;

    document.getElementById("game").innerHTML = "";
    updateUI();
    document.getElementById("time").innerText = time;
    document.getElementById("inputBox").focus();

    setInterval(()=>{
        if(playing) spawnWord();
    },1500);

    update();
    startTimer();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>都道府県タイピング（ゆっくり版）</title>
<style>
body {
    margin: 0;
    background: linear-gradient(#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
    font-family: Arial;
}

#game {
    position: relative;
    width: 700px;
    height: 200px;
    margin: 20px auto;
    background: #111;
    border: 3px solid #444;
    overflow: hidden;
}

.word {
    position: absolute;
    font-size: 28px;
}

.correct {
    color: lightgreen;
}

.wrong {
    color: red;
}

#inputBox {
    font-size: 22px;
    padding: 5px;
    width: 350px;
}

</style>
</head>
<body>

<h2>🍣 都道府県タイピング（ゆっくり）</h2>
<button id="startBtn">スタート</button>

<div id="game"></div>

<input id="inputBox" placeholder="ローマ字で入力..." autocomplete="off">

<div>
スコア: <span id="score">0</span> |
コンボ: <span id="combo">0</span> |
残り時間: <span id="time">60</span>
</div>

<script>
const wordsList = [
"hokkaido","aomori","iwate","miyagi","akita","yamagata","fukushima",
"ibaraki","tochigi","gunma","saitama","chiba","tokyo","kanagawa",
"niigata","toyama","ishikawa","fukui","yamanashi","nagano",
"gifu","shizuoka","aichi","mie",
"shiga","kyoto","osaka","hyogo","nara","wakayama",
"tottori","shimane","okayama","hiroshima","yamaguchi",
"tokushima","kagawa","ehime","kochi",
"fukuoka","saga","nagasaki","kumamoto","oita","miyazaki","kagoshima",
"okinawa"
];

let currentWord = null;
let score = 0;
let combo = 0;
let time = 60;
let playing = false;

// 単語生成（1つだけ）
function spawnWord(){
    const text = wordsList[Math.floor(Math.random()*wordsList.length)];
    const div = document.createElement("div");
    div.className = "word";
    div.innerText = text;
    div.style.left = "700px";
    div.style.top = "80px";

    document.getElementById("game").innerHTML = "";
    document.getElementById("game").appendChild(div);

    currentWord = {
        el: div,
        text: text,
        x: 700,
        index: 0
    };
}

// 更新（超ゆっくり）
function update(){
    if(!playing || !currentWord) return;

    currentWord.x -= 0.9;
    currentWord.el.style.left = currentWord.x + "px";

    if(currentWord.x < -200){
        combo = 0;
        spawnWord();
    }

    requestAnimationFrame(update);
}

// 入力処理（1文字ずつ）
document.getElementById("inputBox").addEventListener("input",(e)=>{
    if(!currentWord) return;

    const val = e.target.value.toLowerCase();
    const correctPart = currentWord.text.slice(0, val.length);

    if(val === correctPart){
        currentWord.el.innerHTML =
            "<span class='correct'>" + correctPart + "</span>" +
            currentWord.text.slice(val.length);

        // 完成！
        if(val === currentWord.text){
            score += 300;
            combo++;

            e.target.value = "";
            spawnWord();
            updateUI();
        }

    } else {
        // ミス
        combo = 0;
        e.target.value = val.slice(0, -1); // 1文字戻す

        currentWord.el.classList.add("wrong");
        setTimeout(()=>currentWord.el.classList.remove("wrong"),150);

        updateUI();
    }
});

// UI更新
function updateUI(){
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
}

// タイマー
function startTimer(){
    const timer = setInterval(()=>{
        if(!playing){
            clearInterval(timer);
            return;
        }

        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            playing = false;
            alert("終了！スコア: " + score);
            clearInterval(timer);
        }
    },1000);
}

// スタート
document.getElementById("startBtn").onclick = ()=>{
    score = 0;
    combo = 0;
    time = 60;
    playing = true;

    document.getElementById("inputBox").value = "";
    document.getElementById("inputBox").focus();
    updateUI();
    document.getElementById("time").innerText = time;

    spawnWord();
    update();
    startTimer();
};
</script>

</body>
</html>

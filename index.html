<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本格音ゲー風ゲーム</title>
<style>
body {
    margin: 0;
    background: #000;
    color: white;
    text-align: center;
    font-family: Arial;
}

#game {
    position: relative;
    width: 320px;
    height: 520px;
    margin: 20px auto;
    background: #111;
    border: 3px solid #555;
    overflow: hidden;
}

.lane {
    position: absolute;
    width: 25%;
    height: 100%;
    border-left: 1px solid #333;
    transition: background 0.1s;
}

.lane.active {
    background: rgba(0,255,255,0.3);
}

.lane:nth-child(1){left:0}
.lane:nth-child(2){left:25%}
.lane:nth-child(3){left:50%}
.lane:nth-child(4){left:75%}

.note {
    position: absolute;
    width: 100%;
    height: 20px;
    background: cyan;
    border-radius: 5px;
}

.hold {
    background: orange;
}

#hitLine {
    position: absolute;
    bottom: 60px;
    width: 100%;
    height: 5px;
    background: red;
}

#judge {
    font-size: 24px;
    height: 30px;
}

</style>
</head>
<body>

<h2>🎵 本格音ゲー風</h2>
<button id="startBtn">スタート</button>

<div id="game">
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="lane"></div>
    <div id="hitLine"></div>
</div>

<div id="judge"></div>
<div>スコア: <span id="score">0</span></div>
<div>コンボ: <span id="combo">0</span></div>
<div>キー: D F J K</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const lanes = 4;
const keys = ["d","f","j","k"];
const game = document.getElementById("game");
const music = document.getElementById("music");

let notes = [];
let score = 0;
let combo = 0;
let startTime = 0;

// 譜面（時間ms）
const chart = [
    {time:1000, lane:0},
    {time:1500, lane:1},
    {time:2000, lane:2, hold:1000},
    {time:3000, lane:3},
    {time:3500, lane:1},
    {time:4000, lane:2}
];

// ノーツ生成
function spawnNote(data){
    const note = document.createElement("div");
    note.className = "note";
    note.style.left = (data.lane*25)+"%";

    if(data.hold){
        note.classList.add("hold");
        note.style.height = data.hold/5 + "px";
    }

    game.appendChild(note);

    notes.push({
        el:note,
        lane:data.lane,
        y:0,
        time:data.time,
        hold:data.hold || 0,
        hit:false
    });
}

// 判定
function judge(diff){
    if(Math.abs(diff)<100) return "Perfect";
    if(Math.abs(diff)<200) return "Great";
    return "Miss";
}

// 更新
function update(){
    let now = performance.now() - startTime;

    // 譜面生成
    chart.forEach(n=>{
        if(!n.spawned && now > n.time-1500){
            spawnNote(n);
            n.spawned = true;
        }
    });

    notes.forEach((n,i)=>{
        let t = now - n.time;
        n.y = t*0.3 + 300;
        n.el.style.top = n.y+"px";

        if(n.y>520 && !n.hit){
            combo = 0;
            notes.splice(i,1);
            n.el.remove();
            updateUI("Miss");
        }
    });

    requestAnimationFrame(update);
}

// 入力
document.addEventListener("keydown",(e)=>{
    let lane = keys.indexOf(e.key);
    if(lane===-1) return;

    document.querySelectorAll(".lane")[lane].classList.add("active");
    setTimeout(()=>document.querySelectorAll(".lane")[lane].classList.remove("active"),100);

    let now = performance.now() - startTime;

    for(let i=0;i<notes.length;i++){
        let n = notes[i];
        if(n.lane===lane){
            let diff = now - n.time;
            let result = judge(diff);

            if(result!=="Miss"){
                n.el.remove();
                notes.splice(i,1);
                combo++;
                score += (result==="Perfect"?300:100)*combo;
                updateUI(result);
                return;
            }
        }
    }

    combo=0;
    updateUI("Miss");
});

// UI更新
function updateUI(text){
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
    document.getElementById("judge").innerText = text;
}

// スタート
document.getElementById("startBtn").onclick=()=>{
    startTime = performance.now();
    music.currentTime = 0;
    music.play();
    update();
};
</script>

</body>
</html>
